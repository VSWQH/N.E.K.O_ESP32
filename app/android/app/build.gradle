
plugins {
    id 'com.android.application'
    id 'com.chaquo.python'
}

android {
    namespace 'com.neko.esp32.pythonserver'
    compileSdk 36

    defaultConfig {
        applicationId 'com.neko.esp32.pythonserver'
        minSdk 26
        targetSdk 28
        versionCode 1
        versionName '1.0.0'

        ndk {
            abiFilters 'arm64-v8a', 'armeabi-v7a'
        }
    }
}

chaquopy {
    defaultConfig {
        version '3.10'
    }
}
