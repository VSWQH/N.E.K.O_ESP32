<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>N.E.K.O_ESP32</title>
<style>
:root{--bg:#eaf7ff;--panel:#f8fcff;--line:#b8def1;--text:#17324d;--muted:#5b7892;--accent:#1b8fd2;--accent2:#0f72b0;--bad:#b91c1c;--ok:#15803d}
*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(180deg,#dff4ff,var(--bg) 45%,#f8fcff);color:var(--text)}
button,input,select,textarea{font:inherit}button{cursor:pointer}.app{width:min(1160px,calc(100% - 28px));margin:0 auto;padding:24px 0 38px}
header{display:flex;justify-content:space-between;gap:16px;align-items:flex-end;padding-bottom:16px}.headline{display:grid;gap:8px;min-width:0}h1{margin:0;font-size:2rem}.subtitle,.hint{color:var(--muted);font-size:.9rem}.device-chip{display:flex;align-items:center;gap:8px;flex-wrap:wrap;border:1px solid var(--line);background:rgba(255,255,255,.72);border-radius:8px;padding:8px 10px;width:max-content;max-width:100%}.device-chip span{color:var(--muted);font-size:.78rem;font-weight:800}.device-chip strong{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:.86rem;color:var(--accent2);word-break:break-all}.tiny-btn{border:1px solid #74bce0;background:white;color:var(--accent2);border-radius:7px;min-height:28px;padding:3px 8px;font-size:.78rem;font-weight:800}.tiny-btn:hover{background:#e9f7ff}.status,.section{border:1px solid var(--line);background:rgba(248,252,255,.92);border-radius:8px;box-shadow:0 14px 34px rgba(19,95,140,.12)}.status{padding:12px 14px;min-width:260px}.status strong,.status span{display:block}.status span{color:var(--muted);font-size:.82rem;margin-top:4px}
.grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(330px,.86fr);gap:16px;align-items:start}.section{padding:18px;margin-bottom:16px}.section-title{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px}h2{margin:0;font-size:1.02rem}
.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.field{display:grid;gap:6px}.field.full{grid-column:1/-1}label{font-size:.83rem;font-weight:700;color:#244761}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:8px;background:white;color:var(--text);min-height:42px;padding:9px 11px;outline:none}textarea{min-height:112px;resize:vertical;line-height:1.55}input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(27,143,210,.15)}
.toggle-row{display:grid;grid-template-columns:22px 1fr;gap:10px;align-items:start;font-weight:700}.toggle-row input{width:18px;min-height:18px;margin-top:2px}.range-row{display:grid;grid-template-columns:1fr 52px;align-items:center;gap:10px}.value{color:var(--accent2);font-weight:800;text-align:right}.voice-list{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.voice{border:1px solid var(--line);border-radius:8px;background:white;color:var(--text);padding:12px;text-align:left;min-height:74px}.voice strong,.voice span{display:block}.voice span{margin-top:5px;color:var(--muted);font-size:.82rem}.voice.active{border-color:var(--accent);background:#e6f6ff;box-shadow:inset 0 0 0 1px rgba(27,143,210,.24)}
.actions{display:flex;gap:10px;flex-wrap:wrap}.btn{border:1px solid transparent;border-radius:8px;min-height:42px;padding:9px 14px;font-weight:800;background:var(--accent);color:white}.btn:hover{background:var(--accent2)}.btn.secondary{background:white;color:var(--accent2);border-color:#74bce0}.btn.secondary:hover{background:#e9f7ff}.btn:disabled{opacity:.58;cursor:not-allowed}.file-box{border:1px dashed #74bce0;border-radius:8px;background:#eef9ff;padding:12px}.memory-list{display:grid;gap:7px;max-height:150px;overflow:auto;margin-top:10px}.memory-item{border:1px solid var(--line);border-radius:8px;background:white;padding:8px 10px;color:var(--muted);font-size:.82rem;line-height:1.45}.log{height:230px;overflow:auto;background:#08324d;color:#d5f1ff;border-radius:8px;padding:12px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:.8rem;line-height:1.5}.log .ok{color:#8df0a8}.log .bad{color:#ffb0b0}.log .warn{color:#ffd18a}.pill{display:inline-flex;align-items:center;min-height:24px;border-radius:999px;border:1px solid var(--line);padding:3px 9px;color:var(--muted);background:white;font-size:.78rem;font-weight:700}
@media(max-width:860px){header{display:block}.status{margin-top:14px;min-width:0}.grid,.form-grid,.voice-list{grid-template-columns:1fr}.app{width:min(100% - 22px,620px);padding-top:16px}h1{font-size:1.55rem}.device-chip{width:100%}}
@media(max-width:560px){body{background:#eaf7ff}.app{width:100%;padding:12px 10px 24px}.section{padding:14px;margin-bottom:12px}.section-title{align-items:flex-start}.subtitle,.hint{font-size:.82rem}.status{padding:10px 12px}.actions{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.actions .btn{width:100%;padding:9px 8px}.btn,input,select,textarea{min-height:44px}.voice{min-height:64px}.log{height:180px;font-size:.76rem}textarea{min-height:104px}.device-chip{align-items:flex-start}.device-chip strong{font-size:.8rem}h2{font-size:.98rem}}
@media(max-width:380px){.actions{grid-template-columns:1fr}.app{padding-left:8px;padding-right:8px}.device-chip strong{font-size:.76rem}}
</style>
</head>
<body>
<main class="app">
<header><div class="headline"><h1>N.E.K.O_ESP32</h1><div class="subtitle">ESP32 语音中转配置，服务端保管 API Key / 音色 ID</div></div><div class="status"><strong id="statusTitle">服务端未同步</strong><span id="statusText">正在读取本地配置</span></div></header>
<div class="grid">
<section>
<div class="section"><div class="section-title"><h2>连接配置</h2><span class="pill" id="voicePill">voice: Tina</span></div><div class="form-grid">
<div class="field full"><label for="apiKey">DashScope API Key（仅保存在服务端）</label><input id="apiKey" type="password" autocomplete="off" placeholder="sk-..."></div>
<div class="field"><label for="model">模型</label><select id="model"><option value="qwen3.5-omni-flash-realtime">qwen3.5-omni-flash-realtime</option><option value="qwen3.5-omni-plus-realtime">qwen3.5-omni-plus-realtime</option><option value="qwen3-omni-flash-realtime">qwen3-omni-flash-realtime</option></select></div>
<div class="field"><label for="relayUrl">ESP32 中转地址（含 Token）</label><input id="relayUrl" readonly></div><div class="field"><label for="pairingToken">配对 Token</label><div style="display:grid;grid-template-columns:1fr auto;gap:8px"><input id="pairingToken" readonly><button class="tiny-btn" id="copyPairingTokenBtn" type="button">复制</button></div></div>
<div class="field full"><label for="volume">音量</label><div class="range-row"><input id="volume" type="range" min="0" max="100" value="50"><span class="value"><span id="volumeValue">50</span>%</span></div></div>
<div class="field"><label class="toggle-row" for="wakeWordEnabled"><input id="wakeWordEnabled" type="checkbox"><span>启用唤醒词</span></label></div>
<div class="field"><label class="toggle-row" for="interruptEnabled"><input id="interruptEnabled" type="checkbox"><span>允许语音打断</span></label></div>
<div class="field"><label for="wakeWord">唤醒词</label><input id="wakeWord" placeholder="悠怡 / 林悠怡"></div>
<div class="field"><label for="wakeTimeout">唤醒保持（秒）</label><input id="wakeTimeout" type="number" min="5" max="300" value="45"></div>
</div></div>
<div class="section"><div class="section-title"><h2>音色</h2><span class="hint">Tina / Ethan / Lucas</span></div><div class="voice-list" id="voiceList"></div><div class="form-grid" style="margin-top:12px"><div class="field full"><label for="customVoice">自定义音色 ID</label><input id="customVoice" placeholder="qwen-omni-vc-..."></div></div></div>
<div class="section"><div class="section-title"><h2>人物设定</h2><span class="hint">默认猫娘对话风格</span></div><div class="field"><label for="instructions">默认设定内容</label><textarea id="instructions"></textarea></div></div>
</section>
<aside>
<div class="section"><div class="section-title"><h2>MP3 语音克隆</h2><span class="hint">10-20 秒清晰人声</span></div><div class="file-box"><div class="field"><label for="voiceName">音色名称前缀</label><input id="voiceName" placeholder="my_voice"></div><div class="field" style="margin-top:12px"><label for="audioFile">MP3 / WAV 文件</label><input id="audioFile" type="file" accept=".mp3,audio/mpeg,audio/mp3,audio/wav,.wav,.m4a,audio/mp4"></div><button class="btn" id="cloneBtn" style="width:100%;margin-top:12px">开始克隆</button></div></div>
<div class="section"><div class="section-title"><h2>保存</h2><span class="hint">服务端配置</span></div><button class="btn" id="saveBtn">保存服务端配置</button></div>
<div class="section"><div class="section-title"><h2>MCP / 记忆</h2><span class="hint">服务端执行</span></div><div class="form-grid" style="margin-bottom:12px"><div class="field"><label for="musicQuery">播放音乐</label><input id="musicQuery" placeholder="歌曲 / 歌手 / 专辑"></div><div class="field"><label for="weatherCity">天气城市</label><input id="weatherCity" placeholder="留空使用当前位置"></div><div class="field full"><label for="defaultWeatherCity">默认天气城市</label><input id="defaultWeatherCity" placeholder="例如 深圳，不填才使用 IP 兜底"></div></div><div class="actions" style="margin-bottom:14px"><button class="btn secondary" id="playMusicBtn">播放音乐</button><button class="btn secondary" id="searchMusicBtn">搜歌</button><button class="btn secondary" id="pauseMusicBtn">暂停音乐</button><button class="btn secondary" id="locationBtn">使用当前位置</button><button class="btn secondary" id="weatherBtn">查询天气</button></div><div class="field"><label class="toggle-row" for="mcpEnabled"><input id="mcpEnabled" type="checkbox"><span>启用 MCP 工具</span></label><label class="toggle-row" for="memoryEnabled"><input id="memoryEnabled" type="checkbox"><span>启用长期记忆注入</span></label></div><div class="field" style="margin-top:12px"><label for="memoryNote">添加记忆</label><textarea id="memoryNote" placeholder="例如：用户喜欢蓝色 UI，回答要简短。"></textarea></div><div class="actions" style="margin-top:10px"><button class="btn secondary" id="addMemoryBtn">添加记忆</button><button class="btn secondary" id="clearMemoryBtn">清空记忆</button></div><div class="memory-list" id="memoryList"></div></div>
<div class="section"><div class="section-title"><h2>日志</h2><button class="btn secondary" id="clearLogBtn" style="min-height:32px;padding:5px 10px">清空</button></div><div class="log" id="log"></div></div>
</aside>
</div></main>
<script>
let defaultInstructions='';let selectedVoice='Tina';let voices=[{id:'Tina',name:'Tina',description:'甜美女声'},{id:'Ethan',name:'Ethan',description:'阳光男声'},{id:'Lucas',name:'Lucas',description:'沉稳男声'}];let apiKeyAvailable=false;let pairingToken='';let serverInfo={};let memoryNotes=[];let memoryRecentTurns=[];let memoryFacts={};let lastRelayDiag='';
const $=id=>document.getElementById(id);const PHONE_ID_KEY='neko_esp32_phone_id';const ACCESS_TOKEN_KEY='neko_esp32_pairing_token';function urlToken(){try{return new URLSearchParams(location.search).get('token')||''}catch(e){return ''}}function rememberAccessToken(t){if(!t)return;try{localStorage.setItem(ACCESS_TOKEN_KEY,t)}catch(e){}}function getAccessToken(){const q=urlToken();if(q){rememberAccessToken(q);return q}try{return localStorage.getItem(ACCESS_TOKEN_KEY)||''}catch(e){return ''}}function authHeaders(extra={}){const h={...extra};const t=getAccessToken();if(t)h['X-Neko-Token']=t;return h}function withTokenUrl(url){const t=pairingToken||getAccessToken();if(!url||!t)return url;return url+(url.includes('?')?'&':'?')+'token='+encodeURIComponent(t)}function randomHex(n=6){const a=new Uint8Array(n);if(window.crypto&&crypto.getRandomValues){crypto.getRandomValues(a)}else{for(let i=0;i<n;i++)a[i]=Math.floor(Math.random()*256)}return Array.from(a,b=>b.toString(16).padStart(2,'0')).join('').toUpperCase()}function getPhoneId(){let incoming='';try{incoming=new URLSearchParams(location.search).get('phone_id')||''}catch(e){}if(incoming){try{localStorage.setItem(PHONE_ID_KEY,incoming)}catch(e){}return incoming}try{let id=localStorage.getItem(PHONE_ID_KEY);if(!id){id=`PHONE-WEB-${randomHex(6)}`;localStorage.setItem(PHONE_ID_KEY,id)}return id}catch(e){return `PHONE-WEB-${randomHex(4)}`}}function initPhoneId(){getPhoneId();const tb=$('copyPairingTokenBtn');if(tb)tb.onclick=async()=>{try{await navigator.clipboard.writeText(pairingToken||getAccessToken());log('配对 Token 已复制','ok')}catch(e){log('复制失败，请手动长按复制','warn')}}}function setStatus(t,x){$('statusTitle').textContent=t;$('statusText').textContent=x||''}function log(m,type=''){const line=document.createElement('div');line.className=type;line.textContent=`[${new Date().toLocaleTimeString()}] ${m}`;$('log').appendChild(line);$('log').scrollTop=$('log').scrollHeight}
function renderVoices(){const box=$('voiceList');box.innerHTML='';voices.forEach(v=>{const b=document.createElement('button');b.type='button';b.className=`voice ${v.id===selectedVoice?'active':''}`;b.innerHTML=`<strong>${v.name}</strong><span>${v.description}</span>`;b.onclick=()=>{selectedVoice=v.id;$('customVoice').value='';renderVoices();syncVoicePill()};box.appendChild(b)})}
function getVoice(){return $('customVoice').value.trim()||selectedVoice}function syncVoicePill(){$('voicePill').textContent=`voice: ${getVoice()||'Tina'}`}
function readForm(){return{api_key:$('apiKey').value.trim(),model:$('model').value,voice:getVoice(),volume:Number($('volume').value),instructions:$('instructions').value.trim()||defaultInstructions,mcp_enabled:$('mcpEnabled').checked,memory_enabled:$('memoryEnabled').checked,wake_word_enabled:$('wakeWordEnabled').checked,interrupt_enabled:$('interruptEnabled').checked,wake_word:$('wakeWord').value.trim()||'悠怡',wake_timeout_seconds:Number($('wakeTimeout').value)||45,default_weather_city:$('defaultWeatherCity').value.trim()}}
function applyConfig(c){apiKeyAvailable=!!c.api_key_set;pairingToken=c.pairing_token||pairingToken||getAccessToken();if(pairingToken)rememberAccessToken(pairingToken);$('apiKey').value='';$('apiKey').placeholder=apiKeyAvailable?`已保存 ${c.api_key_hint||'API Key'}，不填则保持`:'sk-...';if($('pairingToken'))$('pairingToken').value=pairingToken||c.pairing_token_hint||'';const relay=serverInfo.relay_url_with_token||withTokenUrl(serverInfo.relay_url||'');$('relayUrl').value=relay;if(/^ws:\/\/192\.168\.4\./.test(relay)){log('当前中转地址是 ESP32 AP 临时网段 192.168.4.x，不要填入 ESP32；请切回正式 WiFi/热点后再复制','warn')};$('model').value=c.model||'qwen3.5-omni-flash-realtime';$('volume').value=c.volume??50;$('volumeValue').textContent=$('volume').value;$('instructions').value=c.instructions||defaultInstructions;$('mcpEnabled').checked=c.mcp_enabled!==false;$('memoryEnabled').checked=c.memory_enabled!==false;$('wakeWordEnabled').checked=c.wake_word_enabled!==false;$('interruptEnabled').checked=c.interrupt_enabled===true;$('wakeWord').value=c.wake_word||'悠怡';$('wakeTimeout').value=c.wake_timeout_seconds??45;if($('defaultWeatherCity'))$('defaultWeatherCity').value=c.default_weather_city||'';const incoming=c.voice||'Tina';if(voices.some(v=>v.id===incoming)){selectedVoice=incoming;$('customVoice').value=''}else{$('customVoice').value=incoming}renderVoices();syncVoicePill()}
async function loadConfig(){try{const r=await fetch('/api/config',{headers:authHeaders()});const d=await r.json();if(!d.ok)throw new Error(d.error||'读取失败');voices=d.voices||voices;serverInfo=d.server||{};defaultInstructions=d.default_instructions||defaultInstructions;applyConfig(d.config||{});await loadMemory();setStatus('服务端已同步',serverInfo.relay_url?`中转: ${serverInfo.relay_url}`:'配置已读取');log('配置已加载','ok');renderRelayDiag(d.relay||{})}catch(e){setStatus('读取失败',e.message);log(`读取配置失败: ${e.message}。局域网访问请在地址后加 ?token=配对Token`,'bad');renderVoices()}}
function renderRelayDiag(r){const msg=`ESP32=${r.esp32_connected?'已连接':'未连接'} DashScope=${r.dashscope_connected?'已连接':'未连接'} event=${r.last_event||'-'} error=${r.last_error||'-'} client=${r.client||'-'} frames=${r.audio_frames_from_esp32||0} bytes=${r.audio_bytes_to_esp32||0}`;if(msg===lastRelayDiag)return;lastRelayDiag=msg;log(`连接诊断：${msg}`,r.last_error?'bad':(r.esp32_connected?'ok':'warn'));if(r.last_error){setStatus('连接异常',r.last_error)}else if(r.esp32_connected){setStatus('ESP32 已连接',r.dashscope_connected?'DashScope 已连接':'等待 DashScope')}else{setStatus('等待 ESP32',r.last_event||'未连接')}}
async function pollStatus(){try{const r=await fetch('/api/status',{headers:authHeaders()});const d=await r.json();if(!d.ok)throw new Error(d.error||'状态读取失败');serverInfo=d.server||serverInfo;renderRelayDiag(d.relay||{})}catch(e){const msg=`状态轮询失败：${e.message}`;if(msg!==lastRelayDiag){lastRelayDiag=msg;log(msg,'bad')}}}
function renderMemory(){const list=$('memoryList');list.innerHTML='';const factCount=Object.values(memoryFacts||{}).reduce((n,a)=>n+(Array.isArray(a)?a.length:0),0);if(!memoryNotes.length&&!memoryRecentTurns.length&&!factCount){const e=document.createElement('div');e.className='memory-item';e.textContent='暂无长期记忆';list.appendChild(e);return}memoryNotes.slice(-6).reverse().forEach(i=>{const d=document.createElement('div');d.className='memory-item';d.textContent=`手动：${i.text||''}`;list.appendChild(d)});[{k:'master',n:'用户事实'},{k:'relationship',n:'关系偏好'},{k:'assistant',n:'助手事实'}].forEach(g=>(memoryFacts[g.k]||[]).slice(-5).reverse().forEach(i=>{const d=document.createElement('div');d.className='memory-item';d.textContent=`${g.n}：${i.text||''}`;list.appendChild(d)}));memoryRecentTurns.slice(-6).reverse().forEach(i=>{const d=document.createElement('div');d.className='memory-item';d.textContent=`最近 ${i.role==='assistant'?'助手':'用户'}：${i.text||''}`;list.appendChild(d)})}
async function loadMemory(silent=false){try{const r=await fetch('/api/memory',{headers:authHeaders()});const d=await r.json();memoryNotes=d.memory?.notes||[];memoryRecentTurns=d.memory?.recent_turns||[];memoryFacts=d.memory?.facts||{};renderMemory()}catch(e){if(!silent)log(`记忆读取失败: ${e.message}`,'warn')}}
async function postMemory(p){const r=await fetch('/api/memory',{method:'POST',headers:authHeaders({'Content-Type':'application/json'}),body:JSON.stringify(p)});const d=await r.json();if(!r.ok||!d.ok)throw new Error(d.error||'记忆保存失败');memoryNotes=d.memory?.notes||[];memoryRecentTurns=d.memory?.recent_turns||[];memoryFacts=d.memory?.facts||{};renderMemory();await loadMemory()}
async function callTool(name,args={}){const r=await fetch('/api/tools/call',{method:'POST',headers:authHeaders({'Content-Type':'application/json'}),body:JSON.stringify({name,arguments:args})});const d=await r.json();if(!d.tool)throw new Error(d.error||'工具调用失败');log(d.tool.message||'工具已执行',d.tool.ok?'ok':'warn');if(d.esp32&&d.esp32.message)log(`ESP32: ${d.esp32.message}`,d.esp32.ok?'ok':'warn')}
async function saveConfig(){const p=readForm();if(!p.api_key&&!apiKeyAvailable){log('请先填写 DashScope API Key','warn');return}$('saveBtn').disabled=true;try{const r=await fetch('/api/config',{method:'POST',headers:authHeaders({'Content-Type':'application/json'}),body:JSON.stringify(p)});const d=await r.json();if(!r.ok||!d.ok)throw new Error(d.error||'保存失败');applyConfig(d.config);log('服务端配置已保存','ok');if(d.esp32&&d.esp32.message)log(d.esp32.ok?`ESP32配置同步：${d.esp32.message}`:d.esp32.message,d.esp32.ok?'ok':'warn')}catch(e){log(e.message,'bad')}finally{$('saveBtn').disabled=false}}
async function cloneVoice(){const f=$('audioFile').files[0];const key=$('apiKey').value.trim();if(!key&&!apiKeyAvailable){log('请先填写 DashScope API Key','warn');return}if(!f){log('请选择 MP3 或 WAV 文件','warn');return}const form=new FormData();if(key)form.append('api_key',key);form.append('voice_name',$('voiceName').value.trim()||'esp32_voice');form.append('target_model',$('model').value);form.append('audio',f);$('cloneBtn').disabled=true;$('cloneBtn').textContent='克隆中...';try{const r=await fetch('/api/clone',{method:'POST',headers:authHeaders(),body:form});const d=await r.json();if(!r.ok||!d.ok)throw new Error(d.error||'克隆失败');$('customVoice').value=d.voice||'';if(d.config)applyConfig(d.config);log(`克隆成功: ${d.voice}`,'ok')}catch(e){log(`克隆失败: ${e.message}`,'bad')}finally{$('cloneBtn').disabled=false;$('cloneBtn').textContent='开始克隆'}}
async function updateLocation(){if(!navigator.geolocation){log('浏览器不支持定位，可手动填写城市','warn');return}navigator.geolocation.getCurrentPosition(async pos=>{try{const p={lat:pos.coords.latitude,lon:pos.coords.longitude,accuracy:pos.coords.accuracy,label:'手机/浏览器当前位置'};const r=await fetch('/api/location',{method:'POST',headers:authHeaders({'Content-Type':'application/json'}),body:JSON.stringify(p)});const d=await r.json();if(!r.ok||!d.ok)throw new Error(d.error||'定位保存失败');log(`当前位置已保存，精度约 ${Math.round(pos.coords.accuracy)} 米`,'ok')}catch(e){log(`定位保存失败: ${e.message}`,'bad')}},e=>log(`定位失败: ${e.message}。可手动填写城市`,'warn'),{enableHighAccuracy:false,timeout:8000,maximumAge:300000})}
$('volume').oninput=()=>{$('volumeValue').textContent=$('volume').value};$('customVoice').oninput=syncVoicePill;$('saveBtn').onclick=saveConfig;$('cloneBtn').onclick=cloneVoice;$('playMusicBtn').onclick=()=>callTool('server.music.play',{query:$('musicQuery').value.trim()}).catch(e=>log(`播放音乐失败: ${e.message}`,'bad'));$('searchMusicBtn').onclick=()=>callTool('server.music.search',{query:$('musicQuery').value.trim(),open:true}).catch(e=>log(`搜歌失败: ${e.message}`,'bad'));$('pauseMusicBtn').onclick=()=>callTool('server.music.pause',{}).catch(e=>log(`暂停失败: ${e.message}`,'bad'));$('locationBtn').onclick=updateLocation;$('weatherBtn').onclick=()=>{const city=$('weatherCity').value.trim();callTool('server.weather.query',{city,use_current_location:!city}).catch(e=>log(`天气查询失败: ${e.message}`,'bad'))};$('addMemoryBtn').onclick=async()=>{const t=$('memoryNote').value.trim();if(!t)return log('请先填写记忆内容','warn');try{await postMemory({action:'add',text:t});$('memoryNote').value='';log('记忆已添加','ok')}catch(e){log(`记忆保存失败: ${e.message}`,'bad')}};$('clearMemoryBtn').onclick=()=>postMemory({action:'clear'}).then(()=>log('记忆已清空','ok')).catch(e=>log(`清空失败: ${e.message}`,'bad'));$('clearLogBtn').onclick=()=>{$('log').innerHTML=''};
renderVoices();syncVoicePill();initPhoneId();loadConfig();setInterval(pollStatus,1500);setInterval(()=>loadMemory(true),3000);
</script>
</body>
</html>
