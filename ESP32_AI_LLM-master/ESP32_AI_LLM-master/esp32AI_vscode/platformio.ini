; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitm-1]
platform = espressif32 @ 6.5.0
board = esp32-s3-devkitm-1
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions16.csv
board_build.arduino.memory_type = qio_opi
build_flags =
    -DBOARD_HAS_PSRAM
    ; ---- TCP/IP栈优化 ----
    ; TCP重传次数减少（加快断线恢复）
    -DLWIP_TCP_SYNMAXRTX=3
    ; TCP最大分段（标准以太网MTU）
    -DLWIP_TCP_MSS=1460
    ; TCP接收窗口（扩大防抖动）
    -DLWIP_TCP_WND=65536
    ; TCP发送缓冲区（允许积压未确认包）
    -DLWIP_TCP_SND_BUF=32768
    ; TCP keepalive检测（更快发现网络断开）
    -DLWIP_TCP_KEEPALIVE=1
    ; ---- mbedTLS SSL优化 ----
    ; SSL输入缓冲（适应大响应帧）
    -DCONFIG_MBEDTLS_SSL_IN_CONTENT_LEN=16384
    ; SSL输出缓冲
    -DCONFIG_MBEDTLS_SSL_OUT_CONTENT_LEN=4096
    ; SSL会话缓存
    -DCONFIG_MBEDTLS_SSL_CACHE_CONTENT_LEN=4096
    ; ---- WiFi优化 ----
    ; 加快WiFi连接恢复
    -DCONFIG_ESP_WIFI_STA_DISCONNECTED_PM_ENABLE=0
; 指定FLASH容量为16MB
board_upload.flash_size = 16MB
lib_deps =
    bblanchon/ArduinoJson@^6.21.3
    links2004/WebSockets@^2.4.1
